name: Daily Stock Radar

on:
  schedule:
    - cron: '0 8 * * *' # 國際時間 08:00 = 台灣時間 16:00 自動執行
  workflow_dispatch: # 允許你隨時手動點擊按鈕測試

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製程式碼到雲端
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝台股必備套件
        run: |
          pip install yfinance pandas lxml requests

      - name: 4. 執行全台股掃描
        run: python taiwan_stock.py
